<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PracticePace — Practice smarter. Win more.</title>
    <meta
      name="description"
      content="Practice timer, scoreboard, whiteboard, and play library for high school football, basketball, cheer, and more. Built for coaches."
    />

    <!-- Open Graph / social sharing. Defaults apply to every page of
         the SPA (sufficient for the marketing-front-door case; per-
         page tags would require SSR or react-helmet-async, neither of
         which is wired up). Matt: replace og:image with a real
         1200×630 social card when ready. -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Practice:Pace" />
    <meta property="og:title"       content="Practice:Pace — Coach Better Practices, Run Better Games" />
    <meta property="og:description" content="Practice timer, scoreboard, whiteboard, and play library for high school football, basketball, cheer, and more. Built for coaches." />
    <meta property="og:url"         content="https://practicepace.app/" />
    <meta property="og:image"       content="https://practicepace.app/og-image-placeholder.png" />
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Practice:Pace — Coach Better Practices, Run Better Games" />
    <meta name="twitter:description" content="Practice timer, scoreboard, whiteboard, and play library for high school football, basketball, cheer, and more. Built for coaches." />
    <meta name="twitter:image"       content="https://practicepace.app/og-image-placeholder.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#cc1111" />

    <!-- iOS home-screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PracticePace" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
